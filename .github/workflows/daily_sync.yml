name: Daily Release Intelligence Aggregator

on:
  schedule:
    # Run at 9:00 AM UTC (5:00 AM EDT) every morning
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows manual runs from the Actions tab in GitHub

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Scraper & Aggregator
      env:
        SEND_EMAIL_ENABLED: "true"
        GOOGLE_SCRIPT_URL: ${{ secrets.GOOGLE_SCRIPT_URL }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python main.py

    - name: Commit and Push Changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add updates_history.json seen_updates.json dashboard_data.js reports/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update release dashboard data [skip ci]" && git push)
